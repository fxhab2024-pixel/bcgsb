# BCGSP CI — Lint, Type Check, Build
# Runs on every push and PR to main
name: CI

on:
  push:
    branches: [main, "fix/**", "feature/**"]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint & Type Check & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake?schema=public"
      AUTH_SECRET: "test-secret-for-ci-only-do-not-use-in-production"
      NEXT_PUBLIC_SITE_URL: "https://bcgsp.vercel.app"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Lint
        run: bun run lint
        continue-on-error: true # warnings shouldn't fail the build

      - name: Type check
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build
        env:
          SKIP_ENV_VALIDATION: "true"
